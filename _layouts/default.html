<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
      body {
        background-color: #121212;
        color: #e0e0e0;
        font-family: sans-serif;
        max-width: 800px;
        margin: auto;
        padding: 1rem;
        line-height: 1.6;
      }
      a { color: #90caf9; text-decoration: none; }
      a:hover { text-decoration: underline; }
      nav a { margin: 0 10px; }
    </style>
  </head>
  <body>
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/about.html' | relative_url }}">About</a>
      <a href="{{ '/projects.html' | relative_url }}">Projects</a>
      <a href="{{ '/blog.html' | relative_url }}">Blog</a>
    </nav>
    <hr>
    {{ content }}
    <hr>
    <footer>
      <small>&copy; {{ site.time | date: "%Y" }} {{ site.title }} — Contact: <a href="mailto:{{ site.email }}">{{ site.email }}</a></small>
    </footer>
  </body>
</html>
